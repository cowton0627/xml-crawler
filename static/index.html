<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xml-crawler</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --border: #d2d2d7;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --err: #d70015;
    --ok: #248a3d;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 32px 16px;
    line-height: 1.5;
  }
  main { max-width: 720px; margin: 0 auto; }
  header h1 { margin: 0 0 4px; font-size: 1.6rem; }
  header p { margin: 0 0 24px; color: var(--muted); font-size: 0.95rem; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .form { display: flex; gap: 8px; flex-wrap: wrap; }
  .form select, .form input, .form button {
    font: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    background: white;
    color: var(--text);
  }
  .form select { min-width: 110px; }
  .form input { flex: 1; min-width: 200px; }
  .form button {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    cursor: pointer;
    font-weight: 500;
    padding: 8px 20px;
  }
  .form button:hover:not(:disabled) { background: var(--accent-hover); }
  .form button:disabled { opacity: 0.5; cursor: wait; }

  .status { font-size: 0.9rem; margin: 12px 4px; min-height: 1.2em; }
  .status.err { color: var(--err); }
  .status.ok { color: var(--ok); }

  h2 { font-size: 1.05rem; margin: 0 0 12px; }
  ul { list-style: none; padding: 0; margin: 0; }
  li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-top: 1px solid var(--border);
  }
  li:first-child { border-top: none; }
  .feed-name { font-weight: 500; min-width: 200px; }
  .feed-url {
    flex: 1;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.82rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .copy-btn {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    cursor: pointer;
    padding: 4px 10px;
    font-size: 0.85rem;
  }
  .copy-btn:hover { background: var(--bg); }
  .copy-btn.copied { background: var(--ok); color: white; border-color: var(--ok); }

  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
</style>
</head>
<body>
<main>
  <header>
    <h1>xml-crawler</h1>
    <p>輸入 IG / Threads / YouTube 帳號 → 拿到 RSS feed URL → 訂閱</p>
  </header>

  <section class="card">
    <div class="form">
      <select id="platform"></select>
      <input id="handle" type="text" placeholder="@handle 或完整網址" autocomplete="off">
      <button id="add">新增</button>
    </div>
    <div id="status" class="status"></div>
  </section>

  <section class="card">
    <h2>已訂閱</h2>
    <ul id="feeds"></ul>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const statusEl = $("status");

function setStatus(msg, cls = "") {
  statusEl.textContent = msg;
  statusEl.className = "status " + cls;
}

async function loadPlatforms() {
  const r = await fetch("/api/platforms");
  const { platforms } = await r.json();
  $("platform").innerHTML = platforms
    .map((p) => `<option value="${p}">${p}</option>`)
    .join("");
}

async function loadFeeds() {
  const r = await fetch("/api/feeds");
  const { feeds } = await r.json();
  const ul = $("feeds");
  if (!feeds.length) {
    ul.innerHTML = '<li class="empty">尚未訂閱任何來源</li>';
    return;
  }
  ul.innerHTML = feeds
    .map(
      (f) => `
    <li>
      <span class="feed-name">${f.name}</span>
      <span class="feed-url" title="${f.public_url}">${f.public_url}</span>
      <button class="copy-btn" data-url="${f.public_url}">複製</button>
    </li>`,
    )
    .join("");

  ul.querySelectorAll(".copy-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(btn.dataset.url);
      btn.textContent = "已複製";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "複製";
        btn.classList.remove("copied");
      }, 1500);
    });
  });
}

async function addFeed() {
  const platform = $("platform").value;
  const handle = $("handle").value.trim();
  if (!handle) {
    setStatus("請輸入 handle", "err");
    return;
  }
  const btn = $("add");
  btn.disabled = true;
  setStatus("處理中... (抓 RSSHub + git push 約 5-15 秒)");

  try {
    const r = await fetch("/api/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ platform, handle }),
    });
    const data = await r.json();
    if (!r.ok) {
      setStatus(`錯誤: ${data.detail || r.statusText}`, "err");
      return;
    }
    setStatus(
      `✓ 已加入 ${data.name} — GitHub Pages 部署約需 60 秒後 reader 才拿得到`,
      "ok",
    );
    $("handle").value = "";
    await loadFeeds();
  } catch (e) {
    setStatus(`網路錯誤: ${e.message}`, "err");
  } finally {
    btn.disabled = false;
  }
}

$("add").addEventListener("click", addFeed);
$("handle").addEventListener("keydown", (e) => {
  if (e.key === "Enter") addFeed();
});

loadPlatforms();
loadFeeds();
</script>
</body>
</html>
