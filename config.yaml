# 訂閱清單。每個項目會在 feeds/<name>.xml 產生一個 RSS。
#
# 兩種來源任選其一:
#   url:   直接抓這個 URL
#   route: 拼到 http://localhost:1200/<route> (走本機 RSSHub)
#
# YouTube 走 RSSHub 的 playlist 路由,訂閱「uploads playlist」(自動含所有上傳)
# uploads playlist ID = 把 channel ID 開頭的 UC 改成 UU
# (為什麼不用 YouTube 官方 RSS / RSSHub channel 路由,見 DECISIONS.md)

feeds:
  # --- YouTube ---
  - name: youtube-cowton0517
    route: /youtube/playlist/UUTWSgo6Lspo9baGEhWkxDrA
    # 對應頻道: https://www.youtube.com/@cowton0517
    # channel ID: UCTWSgo6Lspo9baGEhWkxDrA → uploads playlist: UUTWSgo6Lspo9baGEhWkxDrA

  # --- Threads ---
  - name: threads-ondo_23333
    route: /threads/ondo_23333
    # 對應: https://www.threads.com/@ondo_23333

  # --- Facebook Public Page ---
  # - name: fb-meta
  #   route: /facebook/page/Meta

  # --- Instagram (需先在 .env 設好 IG_COOKIE,見 .env.example) ---
  # 用 web-api 路由 /instagram/2/user/<帳號>,不是 /instagram/user/<帳號>。
  # 後者是 private-api,沒設 IG_USERNAME/IG_PASSWORD 會回 ConfigNotFoundError;
  # 前者吃 IG_COOKIE。連公開帳號都要 cookie,匿名請求會被 IG 回 429。
  # - name: ig-natgeo
  #   route: /instagram/2/user/natgeo

  - name: youtube-taoofhumility
    route: /youtube/playlist/UUiKGSJ5sxNwfwi0F53R2J8Q
